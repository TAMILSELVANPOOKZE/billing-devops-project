trigger:
- main

pool:
  vmImage: ubuntu-latest

variables:
  acrName: billingacr123
  resourceGroup: billing-rg
  aksCluster: billing-aks

steps:

# Build Backend Image
- task: Docker@2
  displayName: Build and Push Backend Image
  inputs:
    containerRegistry: 'ACR-ServiceConnection'
    repository: billing-api
    command: buildAndPush
    Dockerfile: backend/billing-api/dockerfile
    tags: |
      $(Build.BuildId)

# Build Frontend Image
- task: Docker@2
  displayName: Build and Push Frontend Image
  inputs:
    containerRegistry: 'ACR-ServiceConnection'
    repository: billing-frontend
    command: buildAndPush
    Dockerfile: frontend/billing-ui/Dockerfile
    tags: |
      $(Build.BuildId)

# Deploy to AKS
- task: Kubernetes@1
  displayName: Deploy to AKS
  inputs:
    connectionType: Azure Resource Manager
    azureSubscriptionEndpoint: 'Azure-ServiceConnection'
    azureResourceGroup: $(resourceGroup)
    kubernetesCluster: $(aksCluster)
    command: apply
    useConfigurationFile: true
    configuration: k8s/